<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Hadeed Hussain</title>
  <style>
    :root {
      --primary: #3b82f6;
      --secondary: #8b5cf6;
      --accent: #ec4899;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0f172a;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      overflow: hidden;
    }
    /* Animated background */
    .bg-animation {
      position: absolute;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      opacity: 0.2;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      animation: pulse 10s infinite alternate;
    }
    .blob-1 { top: -10%; left: -10%; width: 400px; height: 400px; background: var(--primary); }
    .blob-2 { bottom: -10%; right: -10%; width: 500px; height: 500px; background: var(--secondary); animation-delay: -2s; }
    
    @keyframes pulse {
      0% { transform: scale(1) translate(0, 0); }
      100% { transform: scale(1.2) translate(10%, 10%); }
    }

    .container {
      position: relative;
      z-index: 10;
      max-width: 600px;
      padding: 60px 40px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    h1 {
      font-size: clamp(80px, 15vw, 150px);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
      letter-spacing: -5px;
    }
    h2 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    p {
      font-size: 18px;
      color: #94a3b8;
      margin-bottom: 40px;
      line-height: 1.6;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      padding: 16px 40px;
      border-radius: 20px;
      text-decoration: none;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 20px 40px rgba(59, 130, 246, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .btn:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 30px 60px rgba(59, 130, 246, 0.5);
    }
    .btn:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div class="bg-animation">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>
  <div class="container">
    <h1>404</h1>
    <h2>Lost in the Code?</h2>
    <p>The page you're searching for has vanished into the digital void. Let's get you back to the main journey.</p>
    <a href="/" class="btn">
      <span>Back to Home</span>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    </a>
  </div>
</body>
</html>
